services:
  backend:
    build:
      context: ./backend
    container_name: smart-leads-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: smart-leads-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped